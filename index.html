<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zimonza Daily Stock Update</title>
  <script type="module">
    import { auth } from './js/firebase-config.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.replace('dashboard.html');
      } else {
        window.location.replace('login.html');
      }
    });
  </script>
</head>
<body style="background:#0F172A;display:flex;align-items:center;justify-content:center;height:100vh;">
  <div style="text-align:center;color:#64748B;font-family:sans-serif;">
    <div style="width:40px;height:40px;border:3px solid rgba(16,185,129,0.3);border-top-color:#10B981;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;"></div>
    <p>Loading Zimonza...</p>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  </div>
</body>
</html>
