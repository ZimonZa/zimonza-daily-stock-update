<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Arrivals — Zimonza</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="css/custom.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/theme.css">
</head>
<body class="bg-slate-950 min-h-screen">
<div id="page-content" class="ml-64 pt-16 transition-all duration-300">
 <div class="p-7 space-y-6 animate-fade-in">

  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
    <div>
      <h1 class="text-2xl font-bold text-white">New Arrivals</h1>
      <p class="text-slate-400 text-sm mt-0.5">Products appearing for the first time on selected date</p>
    </div>
    <div class="flex items-center gap-2">
      <select id="date-select" class="zm-input w-44">
        <option value="">Loading dates…</option>
      </select>
      <select id="cat-filter" class="zm-input w-36">
        <option value="all">All Categories</option>
        <option value="lehnga">Lehnga</option>
        <option value="saree">Saree</option>
      </select>
    </div>
  </div>

  <!-- Stats strip -->
  <div id="stats-strip" class="grid grid-cols-2 sm:grid-cols-4 gap-4"></div>

  <!-- Search -->
  <div class="glass-card p-4 flex gap-3 items-center">
    <input id="search-input" type="text" placeholder="Search SKU or name…" class="zm-input flex-1 max-w-xs">
    <span id="item-count" class="text-slate-500 text-xs ml-auto"></span>
  </div>

  <!-- Table -->
  <div class="glass-card overflow-hidden">
    <div id="table-container"><div class="p-8 flex justify-center"><div class="spinner"></div></div></div>
  </div>
 </div>
</div>

<script type="module">

import { requireAuth } from './js/auth.js';
import { renderShell } from './js/ui-components.js';
import notify from './js/notifications.js';
import { getStockData, getAllUploadDates } from './js/firestore-service.js';
import { analyzeStockChanges } from './js/stock-analyzer.js';
import { CATEGORIES } from './js/constants.js';
import { formatDateDisplay, formatNumber, debounce } from './js/utils.js';

await requireAuth();
renderShell('new-arrivals');
if (window.lucide) lucide.createIcons();

let items = [], allDates = [];

async function load(date) {
  document.getElementById('table-container').innerHTML = '<div class="p-8 flex justify-center"><div class="spinner"></div></div>';
  try {
    const [l, s] = await Promise.all([getStockData(date, CATEGORIES.LEHNGA), getStockData(date, CATEGORIES.SAREE)]);
    const curr = [...l, ...s];
    const allD = await getAllUploadDates();
    const prevDate = allD.find(d => d < date);
    let prev = [];
    if (prevDate) {
      const [pl, ps] = await Promise.all([getStockData(prevDate, CATEGORIES.LEHNGA), getStockData(prevDate, CATEGORIES.SAREE)]);
      prev = [...pl, ...ps];
    }
    const analysis = analyzeStockChanges(curr, prev);
    items = analysis.newArrivals;
    renderStats(items);
    renderTable(items);
  } catch(e) { notify.error('Failed to load.'); }
}

async function init() {
  allDates = await getAllUploadDates();
  const sel = document.getElementById('date-select');
  sel.innerHTML = allDates.map(d => `<option value="${d}">${formatDateDisplay(d)}</option>`).join('');
  sel.addEventListener('change', () => load(sel.value));
  document.getElementById('cat-filter').addEventListener('change', () => renderTable(items));
  document.getElementById('search-input').addEventListener('input', debounce(() => renderTable(items)));
  if (allDates.length) load(allDates[0]);
}

function renderStats(data) {
  const total = data.length;
  const totalPcs = data.reduce((s,i)=>s+(i.totalQty||0),0);
  const lehnga = data.filter(i=>i.category===CATEGORIES.LEHNGA).length;
  const saree = data.filter(i=>i.category===CATEGORIES.SAREE).length;
  document.getElementById('stats-strip').innerHTML = [
    { label:'New SKUs', value: total, color:'from-blue-500/10 border-blue-500/20' },
    { label:'Total Pieces', value: totalPcs, color:'from-emerald-500/10 border-emerald-500/20' },
    { label:'Lehnga', value: lehnga, color:'from-purple-500/10 border-purple-500/20' },
    { label:'Saree', value: saree, color:'from-teal-500/10 border-teal-500/20' },
  ].map(c=>`<div class="bg-gradient-to-br ${c.color} border rounded-2xl p-4 text-center">
    <p class="text-2xl font-bold text-white">${c.value}</p><p class="text-slate-500 text-xs mt-1">${c.label}</p>
  </div>`).join('');
}

function renderTable(data) {
  const cat = document.getElementById('cat-filter').value;
  const q = document.getElementById('search-input').value.toLowerCase();
  let f = data;
  if (cat !== 'all') f = f.filter(i=>i.category===cat);
  if (q) f = f.filter(i=>String(i.sku).toLowerCase().includes(q)||i.name?.toLowerCase().includes(q));
  document.getElementById('item-count').textContent = f.length + ' items';
  if (!f.length) { document.getElementById('table-container').innerHTML = '<p class="text-slate-500 text-sm text-center py-12">No new arrivals found.</p>'; return; }
  const rows = f.map(i=>{
    const colors = (i.colors||[]).map(c=>`<span class="color-badge">${c.name}×${c.qty}</span>`).join(' ');
    return `<tr class="border-t border-white/5 hover:bg-white/3 transition">
      <td class="px-4 py-3 text-emerald-400 font-mono text-sm">${i.sku}</td>
      <td class="px-4 py-3 text-slate-200 text-sm">${i.name}</td>
      <td class="px-4 py-3"><span class="badge badge-info capitalize">${i.category}</span></td>
      <td class="px-4 py-3"><span class="change-new font-bold">+${i.totalQty} pcs</span></td>
      <td class="px-4 py-3"><div class="flex flex-wrap gap-1">${colors}</div></td>
    </tr>`;
  }).join('');
  document.getElementById('table-container').innerHTML = `<div class="overflow-x-auto"><table class="w-full zm-table">
    <thead><tr><th>SKU</th><th>Item Name</th><th>Category</th><th>New Qty</th><th>Colors</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

init();

</script>
</body>
</html>
